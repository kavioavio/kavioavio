name: Refresh public profile metrics

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/metrics.yml

permissions:
  contents: write

concurrency:
  group: public-profile-metrics
  cancel-in-progress: true

jobs:
  metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Generate public GitHub metrics
        uses: lowlighter/metrics@65836723097537a54cd8eb90f61839426b4266b6 # v3.34
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          committer_branch: main
          committer_message: "chore: refresh public profile metrics"
          filename: github-metrics.svg
          output_action: commit
          output_condition: data-changed
          user: kavioavio
          template: classic
          base: header, activity, metadata
          base_indepth: yes
          plugins_errors_fatal: yes
          config_display: large
          config_timezone: Europe/Moscow
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          use_prebuilt_image: yes
