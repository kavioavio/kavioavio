<svg xmlns="http://www.w3.org/2000/svg" width="800" height="320" viewBox="0 0 800 320" role="img" aria-labelledby="title desc">
  <title id="title">Operating model</title>
  <desc id="desc">Observe, decide, execute, verify, and recover within policy, security, and auditability boundaries.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.55" stop-color="#0d2036"/>
      <stop offset="1" stop-color="#17324f"/>
    </linearGradient>
    <linearGradient id="flow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#52d3ff"/>
      <stop offset="1" stop-color="#8b9cff"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#9bc7e8" stroke-width="1" opacity="0.08"/>
    </pattern>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#6ecfff"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="798" height="318" rx="22" fill="url(#background)" stroke="#2b4d6c" stroke-width="2"/>
  <rect x="1" y="1" width="798" height="318" rx="22" fill="url(#grid)"/>
  <circle cx="690" cy="70" r="100" fill="#3d8bfd" opacity="0.10" filter="url(#glow)"/>
  <circle cx="118" cy="245" r="90" fill="#725cff" opacity="0.08" filter="url(#glow)"/>

  <rect x="42" y="38" width="58" height="5" rx="2.5" fill="url(#flow)"/>
  <text x="42" y="75" fill="#f3f8fc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="24" font-weight="700" letter-spacing="1.4">OPERATING MODEL</text>
  <text x="42" y="100" fill="#8fa9bf" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" letter-spacing="0.4">BUILD FOR THE REAL RUNTIME PATH</text>

  <path d="M115 157H195" fill="none" stroke="#5dd0ff" stroke-width="3" marker-end="url(#arrow)" opacity="0.9"/>
  <path d="M275 157H355" fill="none" stroke="#66c5ff" stroke-width="3" marker-end="url(#arrow)" opacity="0.9"/>
  <path d="M445 157H515" fill="none" stroke="#74b5ff" stroke-width="3" marker-end="url(#arrow)" opacity="0.9"/>
  <path d="M595 157H675" fill="none" stroke="#829fff" stroke-width="3" marker-end="url(#arrow)" opacity="0.9"/>

  <g font-family="Inter,Segoe UI,Arial,sans-serif" text-anchor="middle">
    <g transform="translate(80 157)">
      <circle r="35" fill="#102a43" stroke="#52d3ff" stroke-width="2"/>
      <text y="7" fill="#9edcff" font-size="18" font-weight="700">01</text>
      <text y="72" fill="#e7f3fb" font-size="17" font-weight="600">OBSERVE</text>
    </g>
    <g transform="translate(240 157)">
      <circle r="35" fill="#102a43" stroke="#5cc8ff" stroke-width="2"/>
      <text y="7" fill="#9edcff" font-size="18" font-weight="700">02</text>
      <text y="72" fill="#e7f3fb" font-size="17" font-weight="600">DECIDE</text>
    </g>
    <g transform="translate(400 157)">
      <circle r="39" fill="#153454" stroke="#70b5ff" stroke-width="2.5"/>
      <circle r="31" fill="none" stroke="#70b5ff" stroke-width="1" opacity="0.35"/>
      <text y="7" fill="#c0ddff" font-size="18" font-weight="700">03</text>
      <text y="72" fill="#f3f8fc" font-size="17" font-weight="700">EXECUTE</text>
    </g>
    <g transform="translate(560 157)">
      <circle r="35" fill="#172e4d" stroke="#829fff" stroke-width="2"/>
      <text y="7" fill="#c4c8ff" font-size="18" font-weight="700">04</text>
      <text y="72" fill="#e7f3fb" font-size="17" font-weight="600">VERIFY</text>
    </g>
    <g transform="translate(720 157)">
      <circle r="35" fill="#172e4d" stroke="#8b9cff" stroke-width="2"/>
      <text y="7" fill="#d2c9ff" font-size="18" font-weight="700">05</text>
      <text y="72" fill="#e7f3fb" font-size="17" font-weight="600">RECOVER</text>
    </g>
  </g>

  <rect x="42" y="270" width="716" height="1" fill="#52718d" opacity="0.55"/>
  <text x="400" y="297" text-anchor="middle" fill="#8fa9bf" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="600" letter-spacing="2.2">POLICY  ·  SECURITY  ·  AUDITABILITY</text>
</svg>
