      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.55" stop-color="#0d2036"/>
      <stop offset="1" stop-color="#17324f"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#52d3ff"/>
